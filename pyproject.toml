[project]
name = "phageid"
version = "0.1.0"
description = "Automated counting of phage from image sequences."
authors = [
    {name = "Finley Gibson",email = "f.j.gibson@exeter.ac.uk"}
]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "numpy (>=2.2.4,<3.0.0)",
    "click (>=8.1.8,<9.0.0)"
]

[tool.poetry]
packages = [{include = "phageid", from = "src"}]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.scripts]
phageid = "phageid.__main__:main"
